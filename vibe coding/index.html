<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <script src="java.js" defer>
    </script>
</head>
<body>
  <div class="logo"><img src="asset/Logo.png"></div>
  <div class="bg-layer" id="bgLayer"></div>
  <div class="overlay"></div>

  <section class="hero">
    <h1 class="changing"><a href="#view">Click here to see your next upgrade</a></h1>
  </section>
<div id="view">
  <section class="scroll-section" id="gallerySection">
    <div class="phone-wrap">
      <div class="story-text" id="storyText"></div>
      <div class="phone">
        <div class="screen">
          <img class="slide active" data-bg="asset/back1.png" data-text="
          All new powered up camera to capture the moments that matter to you"
           src="asset/phone-back.png">
          <img class="slide" data-bg=
          "asset/back2.png" data-text=
          "Improved and better fast charging."
           src="asset/back2phone.png">
          <img class="slide" data-bg=
          "asset/back3.png" data-text=
          "Using the most powerful chip we have made."
           src="asset/back3phone.jpg">
          <img class="slide" data-bg=
          "asset/back4.jpg" data-text=
          "Stay connected anywhere now with better connection."
           src="asset/back4phone.jpg">
        </div>
        </div>
      </div>
    </div>
  </section>
</body>
</html>
